<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Finance Tracker</h1>
            <div class="user-info">
                <span id="userName"></span>
                <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
                <button id="darkModeToggle" class="dark-mode-btn">🌙 Dark Mode</button>
            </div>
        </div>

        <div class="dashboard">
            <div class="card balance">
                <h3>Total Balance</h3>
                <div class="amount" id="totalBalance">R 0.00</div>
            </div>
            <div class="card income">
                <h3>Total Income</h3>
                <div class="amount" id="totalIncome">R 0.00</div>
            </div>
            <div class="card expense">
                <h3>Total Expenses</h3>
                <div class="amount" id="totalExpenses">R 0.00</div>
            </div>
        </div>

        <div class="form-container">
            <h2>➕ Add Transaction</h2>
            <form id="transactionForm">
                <div class="form-group">
                    <label>Amount (Rands)</label>
                    <input type="number" id="amount" placeholder="e.g., 500" required step="0.01">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="Food">🍔 Food</option>
                        <option value="Rent">🏠 Rent</option>
                        <option value="Transport">🚗 Transport</option>
                        <option value="Salary">💼 Salary</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Entertainment">🎬 Entertainment</option>
                        <option value="Bills">💡 Bills</option>
                        <option value="Other">📌 Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="type" required>
                        <option value="expense">💸 Expense</option>
                        <option value="income">💰 Income</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date" required>
                </div>
                <button type="submit" class="btn-add">➕ Add Transaction</button>
            </form>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Filter by Category:</label>
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                    <option value="Food">🍔 Food</option>
                    <option value="Rent">🏠 Rent</option>
                    <option value="Transport">🚗 Transport</option>
                    <option value="Salary">💼 Salary</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Entertainment">🎬 Entertainment</option>
                    <option value="Bills">💡 Bills</option>
                    <option value="Other">📌 Other</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Search:</label>
                <input type="text" id="searchInput" placeholder="Search transactions...">
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-card">
                <h3>📊 Expenses by Category</h3>
                <canvas id="expenseChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>📈 Income vs Expenses</h3>
                <canvas id="incomeExpenseChart"></canvas>
            </div>
        </div>

        <div class="transactions-container">
            <h2>📋 Transaction History</h2>
            <div id="transactionList" class="transaction-list"></div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
